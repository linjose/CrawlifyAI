version: "3.9"

# =============================================================================
# docker-compose.yml — Spin up PostgreSQL + scraper together
#
# Usage:
#   docker compose up -d postgres          # start only the DB
#   docker compose run --rm scraper        # run scraper once
#   docker compose up scraper              # run with scheduler
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-commodities_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Scraper ─────────────────────────────────────────────────────────────────
  scraper:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres          # override localhost → service name
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: ["--schedule", "--schedule-time", "18:00"]

volumes:
  pg_data:
